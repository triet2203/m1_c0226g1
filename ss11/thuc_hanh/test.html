<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<p id="display"></p>

<script>
    let arrray = new Array(10);
    for (let i = 0; i < arrray.length; i++) {
        arrray[i] = new Array(10);
        for (let j = 0; j < arrray[i].length; j++) {
            arrray[i][j] = "";
        }
    }
    let playerX = true;
    display();
    function display() {
        let tableString = "<table border='1'>";
        for (let i = 0; i < 10; i++) {
            tableString += "<tr>";
            for (let j = 0; j < 10; j++) {
                tableString += `<th onclick="play(${i},${j})" width='30' height='30'>${arrray[i][j]}</th>`
            }
            tableString += "</tr>";
        }
        tableString += "</table>";

        document.getElementById("display").innerHTML = tableString;
    }

    function play(i,j) {
        if (arrray[i][j]==""){
            if (playerX){
                arrray[i][j] = "X";
                playerX =!playerX;
                if (checkWin()){
                    alert("X chiến thắng!!!!")
                }
            }else {
                arrray[i][j] = "O";
                playerX =!playerX;
                if (checkWin()){
                    alert("O chiến thắng!!!!")
                }
            }
        }else {
            alert("Ô này đã đánh rồi bạn ơi")
        }
        display();
    }

    function checkWin(){
        for (let i = 0; i < arrray.length; i++) {
            for (let j = 0; j < arrray[i].length; j++) {
                if (arrray[i][j] =="X"){
                    if (arrray[i][j+1]=="X"&&arrray[i][j+2]=="X"){
                        return true;
                    }
                    if (arrray[i+1][j]=="X"&&arrray[i+2][j]=="X"){
                        return true;
                    }
                    if (arrray[i+1][j+1]=="X"&&arrray[i+2][j+2]=="X"){
                        return true;
                    }
                    if (arrray[i+1][j-1]=="X"&&arrray[i+2][j-2]=="X"){
                        return true;
                    }

                }
            }
        }
        return false;
    }

</script>
</body>
</html>
