<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let characters = ["a", "b", "c", "-", "d", "-", "g"];
    for (let i = 0; i < characters.length; i++) {
        if (characters[i] === "-") {
            characters[i] = "_";
        }
    }
    document.writeln(characters);
</script>
</body>
</html>
