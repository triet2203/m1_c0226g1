<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>

<script>
    let words = ["hello", "world", "responsibility", "priority", 45];
    let count = 0;
    for (let i = 0; i < words.length; i++) {
        if (typeof words[i] === "string") {
            count++;
        }
    }
    document.writeln("Có " + count + " từ")
</script>
