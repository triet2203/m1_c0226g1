<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = [-5, -6, 3, 2, -1];
    let count = 0;
    for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] < 0) {
            count++
        }
    }
    document.writeln("Có " + count + " số nguyên âm trong dãy số");
</script>
</body>
</html>
