<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = [10, 20, 40, 30, 50];
    let average = 0;
    let max = 0
    for (let i = 0; i < numbers.length; i++) {
        average += numbers[i];
        if (numbers[i] > max) {
            max = numbers[i];
        }
    }
    document.writeln("Số lớn nhất là " + max + " . Trung bình của " + numbers.length + " số là " + average/numbers.length);
</script>
</body>
</html>
