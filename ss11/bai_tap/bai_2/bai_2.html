<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = [-23, -2, -3, -4, - 5, -7, -9, -10, -15, -20];
    let max = numbers[0];
    let pos = 0;
    for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] > max) {
            max = numbers[i];
            pos = i + 1;
        }
    }
    document.writeln("Số lớn nhất là: " + max + " nằm ở vị trí thứ " + pos);

</script>
</body>
</html>
