<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let result = [];
    for (let i = 0; i < 10; i++) {
        let numbers = +prompt("Nhập số thứ " + (i + 1));
        if (numbers >= 10) {
            result.push(numbers);
        }
    }
    document.writeln("Số lớn hơn hoặc bằng 10 là: " + result);
</script>
</body>
</html>
