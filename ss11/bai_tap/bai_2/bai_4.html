<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = [1, 3, 5, 7, 9];
    let reverse = [];
    for (let i = numbers.length - 1; i >= 0; i--) {
        reverse.push(numbers[i]);
    }
    document.writeln(reverse);
</script>
</body>
</html>
