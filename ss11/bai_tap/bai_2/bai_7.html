<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = [10, 20, 3, 7, "V", 6, 9, 33, 34, 52];
    let pos = -1;
    for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] === "V") {
            pos = i;
            break;
        }
    }
    for (let i = pos; i < numbers.length - 1; i++) {
        numbers[i] = numbers[i + 1];
    }
    numbers[numbers.length - 1] = 0;
    document.writeln(numbers);
</script>
</body>
</html>
