<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let words = "The Quick Brown Fox";
    let result = [];
    for (let i = 0; i < words.length; i++) {
        if (words[i] === words[i].toUpperCase()) {
            result += words[i].toLowerCase();
        } else {
            result += words[i].toUpperCase();
        }
    }
    document.writeln(result);
</script>
</body>
</html>
