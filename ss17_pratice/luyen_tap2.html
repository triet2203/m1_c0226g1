<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let arr = [1, 4, 4, 3, 4]
    let max = -Infinity;
    let count = 0;
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] > max) {
            max = arr[i];
            count = 1;
        } else if (max === arr[i]) {
            count++;
        }
    }
    console.log(max);
    console.log(count);
</script>
</body>
</html>
