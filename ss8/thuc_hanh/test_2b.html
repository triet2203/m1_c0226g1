<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let day = +prompt("Nhập ngày");
    let month = +prompt("Nhập tháng");
    let year = +prompt("Nhập năm");
    let daysInMonth;
    if (month > 0 && month <= 31) {
        if (month == 1 || month == 3 || month == 5 || month == 7 || month == 8 || month == 10 || month == 12) {
            daysInMonth = 31;
        } else if (month == 2) {
            if (month > 0 && month <= 29){
                if (isLeapYear(year)) {
                    daysInMonth = 29;
                } else {
                    daysInMonth = 28;
                }
            }
            else {
                alert("Tháng " + month + "không có ngày " + day);
            }
        } else {
            daysInMonth = 30;
        }
    } else {
        alert("Không có ngày " + day);
    }
    day++;
    if (day > daysInMonth) {
        day = 1;
        month++;
    }
    if (month > 12) {
        month = 1;
        year++;
    }
    alert("Ngày " + day + " tháng " + month + " năm " + year);

    function isLeapYear(year) {
        if (year % 4 == 0 && year % 100 != 0 || year % 400 == 0) {
            return true;
        } else
            return false;
    }
</script>
</body>
</html>
