<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let age = prompt("Nhập số tuổi của bạn")
    if (age > 0) {
        if (age == 15) {
            alert("Bạn đủ điều kiện học lớp 10");
        } else {
            alert("Bạn không đủ điều kiện học lớp 10");
        }
    }
    else {
        alert("Nhập lại");
    }
</script>
</body>
</html>
