<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <style>
        table {
            border: 4px solid black;
            padding: 15px;
            background: #eee;
        }

        input {
            width: 60px;
            height: 40px;
            font-size: 20px;
            text-align: center;
        }

        #screen {
            width: 260px;
            text-align: right;
        }
    </style>
</head>

<body>

<table>
    <tr>
        <td colspan="4">
            <input type="text" id="screen">
        </td>
    </tr>

    <tr>
        <td><input onclick="char(this.value)" type="button" value="1"></td>
        <td><input onclick="char(this.value)" type="button" value="2"></td>
        <td><input onclick="char(this.value)" type="button" value="3"></td>
        <td><input onclick="char(this.value)" type="button" value="+"></td>
    </tr>

    <tr>
        <td><input onclick="char(this.value)" type="button" value="4"></td>
        <td><input onclick="char(this.value)" type="button" value="5"></td>
        <td><input onclick="char(this.value)" type="button" value="6"></td>
        <td><input onclick="char(this.value)" type="button" value="-"></td>
    </tr>

    <tr>
        <td><input onclick="char(this.value)" type="button" value="7"></td>
        <td><input onclick="char(this.value)" type="button" value="8"></td>
        <td><input onclick="char(this.value)" type="button" value="9"></td>
        <td><input onclick="char('*')" type="button" value="x"></td>
    </tr>

    <tr>
        <td><input onclick="clr()" type="button" value="C"></td>
        <td><input onclick="char(this.value)" type="button" value="0"></td>
        <td><input onclick="calculate()" type="button" value="="></td>
        <td><input onclick="char(this.value)" type="button" value="/"></td>
    </tr>

</table>
<script>
    function char(value) {
        document.getElementById("screen").value += value;
    }

    function calculate() {
        let result = eval(document.getElementById("screen").value);
        document.getElementById("screen").value = result
    }

    function clr() {
        document.getElementById("screen").value = "";
    }
</script>
</body>
</html>
