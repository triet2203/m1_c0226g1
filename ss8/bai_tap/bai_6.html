<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = prompt("Nhập số nguyên bất kì");
    if (num % 1 == 0) {
        if (num < 0) {
            alert(num + " nhỏ hơn 0");
        } else if (num == 0) {
            alert(num + " bằng 0");
        } else {
            alert(num + " lớn hơn 0");
        }
    } else
        alert("Số bạn nhập không phải số nguyên, xin nhập lại");
</script>
</body>
</html>
