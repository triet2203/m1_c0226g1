<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let n = +prompt("Nhập số phần tử");
    let arr = [];
    for (let i = 0; i < n; i++) {
        let numbers = prompt("Nhập phần tử thứ " + (i + 1));
        arr.push(numbers);
    }
    document.writeln(arr);

    function countMaxNumber(arr) {
        let max = arr[0];
        let count = 1;
        for (let i = 1; i < arr.length; i++) {
            if (arr[i] > max) {
                max = arr[i];
                count = 1;
            } else if (arr[i] === max) {
                count++;
            }
        }
        return count;
    }

    document.writeln(countMaxNumber(arr));

</script>
</body>
</html>
