<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let n = +prompt("Nhập số phần tử");
    if (n % 2 !== 0) {
        alert("Số phần tử phải chẵn");
    } else {
        arr = [];
        for (let i = 0; i < n; i++) {
            let numbers = +prompt("Nhập số thứ " + (i + 1));
            arr.push(numbers);
        }
    }

    document.writeln(arr);

    function checkArray(arr) {
        for (let i = 0; i < arr.length - 1; i += 2) {
            if (arr[i] >= arr[i + 1]) {
                return false;
            }
        }
        return true;
    }

    if (checkArray(arr)) {
        alert("OK");
    } else {
        alert("NO");
    }


</script>
</body>
</html>
