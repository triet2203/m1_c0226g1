<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ĐĂNG KÝ HỌC VIÊN</title>
</head>
<body style="background: lightyellow;">
<form>
    <h2 style="background: #a0d6d6; color: #1a3dc1; width: 700px">ĐĂNG KÝ HỌC VIÊN</h2>
    <label style="color: blue; line-height: 30px">Họ và tên</label>
    <input type="text" name="name" style="margin-left: 8px"><br>
    <label style="color: blue; line-height: 30px">Ngày sinh</label>
    <input type="text" name="birthday" style="width: 95px; margin-left: 5px"><br>
    <label style="color: blue; line-height: 30px">Giới tính</label>
    <input name="gender" type="radio" style="margin-left: 13px">Nam
    <input name="gender" type="radio">Nữ<br>
    <table>
        <tr>
            <td valign="top" style="color: blue;">Địa chỉ</td>
            <td>
                <textarea style="margin-left: 19px" rows="4" cols="20"></textarea>
            </td>
        </tr>
    </table>
    <label style="color: blue; line-height: 30px">Lớp</label>
    <select style="margin-left: 41px" name="class">
        <option value="class1">- Chọn lớp -</option>
        <option value="class1">Lớp 10</option>
        <option value="class1">Lớp 11</option>
        <option value="class1">Lớp 12</option>
    </select><br>
    <label style="color: blue; line-height: 30px">Email</label>
    <input name="email" type="email" style="margin-left: 29px; width: 120px"><br>
    <label style="color: blue; line-height: 30px">Điện thoại</label>
    <input name="phone" type="tel" style="width: 120px"><br>
    <input type="submit" value="Đăng ký" style="margin-left: 71px">
    <input type="reset" value="Nhập lại">
</form>
</body>
</html>
