<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let num1 = 0;
  let num2 = 1;
  while (true) {
    let num3 = num1 + num2;
    if (num3 % 5 ==0) {
      document.writeln("Số fibonacci đầu tiên chia hết cho 5 là: " + num3);
      break;
    }
    num1 = num2;
    num2 = num3;
  }
</script>
</body>
</html>
