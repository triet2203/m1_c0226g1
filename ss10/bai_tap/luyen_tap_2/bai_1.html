<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num1 = 0;
    let num2 = 1;
    let count = 0;
    let num = +prompt("Nhập 1 số bất kì");
    if (num > 0) {
        while (count < num) {
            document.writeln(num1 + ", ");
            let num3 = num1 + num2;
            num1 = num2;
            num2 = num3;
            count++;
        }
    } else {
        alert("Nhập lại");
    }
</script>
</body>
</html>
