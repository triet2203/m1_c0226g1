<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num1 = 0;
    let num2 = 1;
    let total = 0;
    for (let i = 1; i <= 20; i++) {
        total = total + num1;
        let num3 = num1 + num2;
        num1 = num2;
        num2 = num3;
    }
    document.writeln("Tổng 20 số đầu của dãy Fibonacci là " + total);
</script>
</body>
</html>
