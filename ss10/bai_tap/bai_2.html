<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num = 2;
    let primeCount = 0;
    let num2 = +prompt("Nhập 1 số")
    while (primeCount < num2) {
        let count = 0;
        for (let i = 2; i < num; i++) {
            if (num % i == 0) {
                count++;
            }
        } if (count == 0) {
            document.writeln(num);
            primeCount++;
        }
        num ++;
    }

</script>
</body>
</html>
