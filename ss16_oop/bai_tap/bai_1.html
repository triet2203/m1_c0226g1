<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<canvas id="myCanvas" width="400" height="300"></canvas>
<p id="result"></p>
<script>
    class Rectangle {
        length;
        width;
        constructor(length, width) {
            this.length = length;
            this.width = width;
        }

        getArea() {
            return this.length * this.width;
        }

        getPerimeter() {
            return 2 * (this.length + this.width);
        }

        draw(canvasId) {
            let canvas = document.getElementById(canvasId);
            let ctx = canvas.getContext("2d");
            ctx.fillStyle = "green";
            ctx.fillRect(50, 50, this.length, this.width);
        }
    }

    let lenght1 = +prompt("Nhập chiều dài hình chữ nhật");
    let width1 = +prompt("Nhập chiều rộng hình chữ nhật");
    let rect = new Rectangle(lenght1, width1);
    rect.draw("myCanvas");
    document.getElementById("result").innerHTML = "Diện tích hình chữ nhật là " + rect.getArea() +
        "<br>Chu vi hình chữ nhật là " + rect.getPerimeter();



</script>
</body>
</html>
