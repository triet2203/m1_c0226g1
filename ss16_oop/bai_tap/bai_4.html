<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    class Apple {
        #weight;

        constructor() {
            this.#weight = 10;
        }

        decrease() {
            if (this.#weight > 0) {
                this.#weight--;
            }
        }

        isEmpty() {
            return this.#weight === 0;
        }

        getWeight() {
            return this.#weight;
        }
    }

    class Human {
        name;
        gender;
        weight;

        constructor(name, gender, weight) {
            this.name = name;
            this.gender = gender;
            this.weight = weight;
        }

        isMale() {
            return this.gender;
        }

        setGender(gender) {
            this.gender = gender;
        }

        checkApple(apple) {
            return this.getWeight() > 0;
        }

        eat(apple) {
            if (apple.getWeight() > 0) {
                apple.decrease();
                this.weight++;
                console.log(this.name + " ăn 1 miếng táo");
            } else {
                console.log("Táo hết rồi nha");
            }
        }

        say(text) {
            console.log(this.name + " nói " + text);
        }

        getName() {
            return this.name;
        }

        setName(name) {
            this.name = name;
        }

        getWeight() {
            return this.weight;
        }

        setWeight(weight) {
            this.weight = weight;
        }
    }

    let apple = new Apple();
    let adam = new Human("Adam", true, 60);
    let eva = new Human("Eva", false, 40);

    console.log("Khối lượng táo ban đầu: " + apple.getWeight());
    while (!apple.isEmpty()) {
        adam.eat(apple);
        if (!apple.isEmpty()) {
            eva.eat(apple);
        }
        console.log("Khối lượng táo còn: " + apple.getWeight())
        console.log("Cân nặng của Adam: " + adam.getWeight());
        console.log("Cân nặng của Eva: " + eva.getWeight());
    }
    adam.eat(apple);
</script>
</body>
</html>
