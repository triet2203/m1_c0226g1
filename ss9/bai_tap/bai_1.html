<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let C = +prompt("Nhập độ C");
    let F = C * 9/5 + 32;
    if (C > 0) {
        alert(C + " độ C bằng " + F + " độ F");
    }
    else {
        alert("Nhập lại");
    }
</script>
</body>
</html>
