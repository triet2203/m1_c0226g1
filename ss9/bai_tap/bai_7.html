<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let num1 = +prompt("Nhập a");
    let num2 = +prompt("Nhập b");
    let num3 = +prompt("Nhập c");
    let x1;
    let x2;
    let delta = num2 ** 2 - 4 * num1 * num3;
    if (num1 != 0) {
        if (delta < 0) {
            alert("Phương trình vô nghiệm");
        } else if (delta == 0) {
            x1 = x2 = -num2 / 2 * num1;
            alert("Phương trình có nghiệm kép x1 = x2 = " + x1);
        } else {
            x1 = (-num2 + Math.sqrt(delta)) / (2 * num1);
            x2 = (-num2 - Math.sqrt(delta)) / (2 * num1);
            alert("Phương trình có 2 nghiệm phân biệt là x1 = " + x1 + " và x2 = " + x2);
        }
    } else {
        if (num2 == 0) {
            if (num3 == 0) {
                alert("Phương trình vô số nghiệm");
            } else {
                alert("Phương trình vô nghiệm")
            }
        } else {
            x1 = -num3 / num2;
            alert("Phương trình có 1 nghiệm là x = " + x1);
        }
    }
</script>
</body>
</html>
