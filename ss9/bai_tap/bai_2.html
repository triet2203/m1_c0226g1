<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tính số ngày</title>
</head>
<body>
<h2>Tính số ngày trong tháng</h2>
<input id="month" type="number" placeholder="Nhập tháng">
<button onclick="checkDay()">Tính số ngày</button>
<p id="display"></p>
<script>
    function checkDay() {
        let checkMonth = document.getElementById("month").value;
        switch (checkMonth) {
            case "1":
            case "3":
            case "5":
            case "7":
            case "8":
            case "10":
            case "12":
                document.getElementById('display').innerText = "Tháng " + checkMonth + ' có 31 ngày';
                break;
            case "2":
                document.getElementById('display').innerText = "Tháng " + checkMonth + ' có 28 hoặc 29 ngày';
                break;
            case "4":
            case "6":
            case "9":
            case "11":
                document.getElementById('display').innerText = "Tháng " + checkMonth + ' có 30 ngày';
                break;
            default:
                document.getElementById('display').innerText = "Vui lòng nhập lại tháng";
        }
    }
</script>
</body>
</html>
