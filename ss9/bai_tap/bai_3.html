<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let canh = +prompt("Nhập cạnh hình vuông");
    let dienTich = canh ** 2;
    if (canh > 0) {
        alert("Diện tích hình vuông là " + dienTich);
    }
    else {
        alert("Nhập lại cạnh");
    }
</script>
</body>
</html>
