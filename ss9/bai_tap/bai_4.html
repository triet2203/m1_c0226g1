<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let edge1 = +prompt("Nhập cạnh a");
    let edge2 = +prompt("Nhập cạnh b");
    let area = edge1 * edge2;
    if (edge1 > 0 && edge2 > 0) {
        alert("Diện tích hình chữ nhật là: " + area);
    } else {
        alert("Nhập lại cạnh");
    }
</script>
</body>
</html>
