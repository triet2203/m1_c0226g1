<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculate</title>
</head>
<body>
<script>
    let dai = Number(prompt("Nhập chiều dài: "));
    let rong = Number(prompt("Nhập chiều rộng: "));
    let chuVi = (dai+rong)*2;
    let dienTich= dai*rong;
    alert("Chu vi hình chữ nhật là: "+chuVi);
    alert("Diện tích hình chữ nhật là: "+dienTich);
</script>
</body>
</html>
