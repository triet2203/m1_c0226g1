<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calender</title>
    <style>
        table {
            text-align: center;
            font-size: 20px;
            width: 800px;
        }

        th, td {
            width: 50px;
            height: 30px;
        }

        .headred {
            background-color: red;
            color: white;
        }

        .red {
            color: red;
        }

        .headorange {
            background-color: orange;
            color: white;
        }

        .headblue {
            background-color: blue;
            color: white;
        }

        .blue {
            color: blue;
        }

        .black {
            color: black;
        }
    </style>
</head>
<body style="width: 800px">
<h2 style="text-align: center; color: blue">Tháng 10 - October</h2>
<table>
    <tr>
        <th class="headred">C.Nhật</th>
        <th class="headorange">T.Hai</th>
        <th class="headorange">T.Ba</th>
        <th class="headorange">T.Tư</th>
        <th class="headorange">T.Năm</th>
        <th class="headorange">T.Sáu</th>
        <th class="headblue">T.Bảy</th>
    </tr>
    <tr>
        <td class="red">Sun</td>
        <td>Mon</td>
        <td>Tue</td>
        <td>Wed</td>
        <td>Thu</td>
        <td>Fri</td>
        <td class="blue">Sat</td>
    </tr>
</table>
<table style="border: 2px solid gray; border-collapse: collapse;">
    <tr>
        <td style="border: 2px solid gray"></td>
        <td style="border: 2px solid gray"></td>
        <td style="border: 2px solid gray"></td>
        <td style="border: 2px solid gray"></td>
        <td style="border: 2px solid gray">1<sub>13</sub></td>
        <td style="border: 2px solid gray">2<sub>14</sub></td>
        <td style="border: 2px solid gray" class="blue">3<sub class="black">15</sub></td>
    </tr>
    <tr>
        <td style="border: 2px solid gray" class="red">4<sub class="black">16</sub></td>
        <td style="border: 2px solid gray">5<sub>17</sub></td>
        <td style="border: 2px solid gray">6<sub>18</sub></td>
        <td style="border: 2px solid gray">7<sub>19</sub></td>
        <td style="border: 2px solid gray">8<sub>20</sub></td>
        <td style="border: 2px solid gray">9<sub>21</sub></td>
        <td style="border: 2px solid gray" class="blue">10<sub class="black">22</sub></td>
    </tr>
    <tr>
        <td style="border: 2px solid gray" class="red">11<sub class="black">23</sub></td>
        <td style="border: 2px solid gray">12<sub>24</sub></td>
        <td style="border: 2px solid gray">13<sub>25</sub></td>
        <td style="border: 2px solid gray">14<sub>26</sub></td>
        <td style="border: 2px solid gray">15<sub>27</sub></td>
        <td style="border: 2px solid gray">16<sub>28</sub></td>
        <td style="border: 2px solid gray" class="blue">17<sub class="black">29</sub></td>
    </tr>
    <tr>
        <td style="border: 2px solid gray" class="red">18<sub class="black">1.9</sub></td>
        <td style="border: 2px solid gray">19<sub>2</sub></td>
        <td style="border: 2px solid gray">20<sub>3</sub></td>
        <td style="border: 2px solid gray">21<sub>4</sub></td>
        <td style="border: 2px solid gray">22<sub>5</sub></td>
        <td style="border: 2px solid gray">23<sub>6</sub></td>
        <td style="border: 2px solid gray" class="blue">24<sub class="black">7</sub></td>
    </tr>
    <tr>
        <td style="border: 2px solid gray" class="red">25<sub class="black">8</sub></td>
        <td style="border: 2px solid gray">26<sub>9</sub></td>
        <td style="border: 2px solid gray">27<sub>10</sub></td>
        <td style="border: 2px solid gray">28<sub>11</sub></td>
        <td style="border: 2px solid gray">29<sub>12</sub></td>
        <td style="border: 2px solid gray">30<sub>13</sub></td>
        <td style="border: 2px solid gray" class="blue">31<sub class="black">14</sub></td>
    </tr>
</table>
</body>
</html>
