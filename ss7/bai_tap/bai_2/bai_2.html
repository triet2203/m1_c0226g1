<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency</title>
</head>
<body>
<form>
    <label><b>Amount</b></label>
    <label style="margin-left:50px"><b>From Currency</b></label>
    <label style="margin-left: 10px"><b>To Currency</b></label><br>
    <input style="width: 100px; height: 25px" name="amount" id="amount">
    <select style="width: 80px; height: 30px" id="currency1">
        <option>VND</option>
        <option>USD</option>
    </select>
    <select style="margin-left: 39px; width: 80px; height: 30px" id="currency2">
        <option>VND</option>
        <option>USD</option>
    </select>
    <button type="button" onclick="convert()">Convert</button>
    <h2 id="display"></h2>
    <script>
        function convert() {
            let money = +document.getElementById('amount').value;
            let change1 = document.getElementById('currency1').value;
            let change2 = document.getElementById('currency2').value;
            let result;
            if (change1 == "VND" && change2 == "USD") {
                result = money / 23000;
            } else if (change1 == "USD" && change2 == "VND") {
                result = money * 23000;
            } else {
                result = money;
            }
            document.getElementById("display").innerText = money + " " + change1 + " bằng " + result + " " + change2;
        }
    </script>
</form>
</body>
</html>
