<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency</title>
</head>
<body>
<form>
    <label><b>Amount</b></label>
    <label style="margin-left:50px"><b>From Currency</b></label>
    <label style="margin-left: 10px"><b>To Currency</b></label><br>
    <input style="width: 100px; height: 25px" name="amount" id="amount">
    <select style="width: 80px; height: 30px" id="cur1">
        <option>VND</option>
        <option>USD</option>
    </select>
    <select style="margin-left: 39px; width: 80px; height: 30px" id="cur2">
        <option>VND</option>
        <option>USD</option>
    </select>
    <button type="button" onclick="convert()">Convert</button>
    <h2 id="display"></h2>
    <script>
        function convert() {
            let a = +document.getElementById('amount').value;
            let c1 = document.getElementById('cur1').value;
            let c2 = document.getElementById('cur2').value;
            let result;
            if (c1 == "VND" && c2 == "USD") {
                result = a / 23000;
            } else if (c1 == "USD" && c2 == "VND") {
                result = a * 23000;
            } else {
                result = a;
            }
            document.getElementById("display").innerText = a + " " + c1 + " bằng " + result + " " + c2;
        }
    </script>
</form>
</body>
</html>
