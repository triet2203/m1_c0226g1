<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<body>
<form>
    <h2>Caculator</h2>
    <input id="number1" placeholder="Nhập số thứ nhất">
    <input id="number2" placeholder="Nhập số thứ hai"><br>
    <button type="button" onclick="addition()">Addition(+)</button>
    <button type="button" onclick="subtraction()">Subtraction(-)</button>
    <button type="button" onclick="multiplication()">Multiplication(x)</button>
    <button type="button" onclick="division()">Division(/)</button>
    <h2 id="result"></h2>
    <script>
        function addition() {
            let num1 = +document.getElementById("number1").value;
            let num2 = +document.getElementById("number2").value;
            add = num1 + num2;
            document.getElementById("result").innerText = "Kết quả là: " + add;
        }

        function subtraction() {
            let num1 = +document.getElementById("number1").value;
            let num2 = +document.getElementById("number2").value;
            sub = num1 - num2;
            document.getElementById("result").innerText = "Kết quả là: " + sub;
        }

        function multiplication() {
            let num1 = +document.getElementById("number1").value;
            let num2 = +document.getElementById("number2").value;
            mul = num1 * num2;
            document.getElementById("result").innerText = "Kết quả là: " + mul;
        }

        function division() {
            let num1 = +document.getElementById("number1").value;
            let num2 = +document.getElementById("number2").value;
            div = num1 / num2;
            document.getElementById("result").innerText = "Kết quả là: " + div;
        }
    </script>
</form>
</body>
</html>
