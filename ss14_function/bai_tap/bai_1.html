<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function isPrime(number) {
        if (number < 2) {
            return false;
        }

        for (let i = 2; i < Math.sqrt(number); i++) {
            if (number % i == 0) {
                return false;
            }
        }
        return true;
    }
    let number = +prompt("Nhập 1 số để kiểm tra");
    if (isPrime(number)) {
        alert(number + " là số nguyên tố");
    } else {
        alert(number + " không phải là số nguyên tố");
    }
</script>
</body>
</html>
