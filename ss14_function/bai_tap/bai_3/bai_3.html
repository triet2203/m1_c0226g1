<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  let num3 = +prompt("Nhập số thứ 1");
  let num4 = +prompt("Nhập số thứ 2");
  compareNumber(num3,num4);

  function compareNumber(num1, num2) {
    if (num1 > num2) {
      alert(num1 + " lớn hơn " + num2);
    } else {
      let sum = num1 + num2;
      alert("Tổng 2 số là " + sum);
    }
  }
</script>
</body>
</html>
