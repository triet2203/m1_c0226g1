<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<p id="result"></p>
<script>
    function increaseNumber(num) {
        return num + 1;
    }

    let number = +prompt("Nhập 1 số");
    document.getElementById("result").innerHTML = "Kết quả: " + increaseNumber(number);
</script>
</body>
</html>
