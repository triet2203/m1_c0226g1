<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let stars = ["Polaris", "Aldebaran", "Deneb", "Vega", "Altair", "Dubhe", "Regulus"];
    let constellations = ["Ursa Minor", "Taurus", "Cygnus", "Lyra", "Aquila", "Ursa Major", "Leo"];

    function findConstellation(starname) {
        for (let i = 0; i < stars.length; i++) {
            if (stars[i] === starname) {
                return constellations[i];
            }
        }
        return null;
    }

    let input = prompt("Nhập tên ngôi sao");
    let result = findConstellation(input);
    if (result) {
        document.writeln("Chòm sao là " + result);
    } else {
        document.writeln("Không tìm thấy");
    }
</script>
</body>
</html>
