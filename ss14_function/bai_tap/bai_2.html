<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function footMeter(foot) {
        return 0.305 * foot;
    }

    function meterFoot(meter) {
        return 3.279 * meter;
    }

    let m = +prompt("Nhập meter");
    document.writeln((m + " meter = " + footMeter(m) + " foot<br>"));

    let f = +prompt("Nhập footer");
    document.writeln((f + " footer = " + meterFoot(f) + " meter"));
</script>
</body>
</html>
