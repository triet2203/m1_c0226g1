<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function checkNumber(character) {
        return character.length === 1 && character >= '0' && character <= '9';
    }

    let input = prompt("Nhập 1 ký tự");
    if (checkNumber(input)) {
        alert("true");
    } else {
        alert("false");
    }
</script>
</body>
</html>
