<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function calculateArea(radius) {
        return radius * radius * 3.14;
    }

    function calculatePerimeter(radius) {
        return radius * 2 * 3.14;
    }

    let input = +prompt("Nhập bán kính đường tròn")
    let area = calculateArea(input);
    let perimeter = calculatePerimeter(input);
    alert("Diện tích hình tròn là " + area);
    alert("Chu vi hình tròn là " + perimeter);
</script>
</body>
</html>
