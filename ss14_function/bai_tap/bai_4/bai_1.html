<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function isSquare(number) {
        return number * number;
    }

    let input = +prompt("Nhập số bất kì");
    let result = isSquare(input);
    document.writeln("Bình phương của " + input + " là " + result);
</script>
</body>
</html>
