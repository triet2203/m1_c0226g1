<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function swapNumber(number1, number2) {
        return [number2, number1];
    }
    let numb1 = +prompt("Nhập 1 số");
    let numb2 = +prompt("Nhập 1 số");
    [numb1, numb2] = swapNumber(numb1, numb2);
    alert("Sau khi đổi số thứ 1 là " + numb1 + " số thứ 2 là " + numb2);
</script>
</body>
</html>
