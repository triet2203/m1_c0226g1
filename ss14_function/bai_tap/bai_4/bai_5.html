<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function compareNumber(number1, number2, number3) {
        if (number1 < number2 && number1 < number3) {
            return number1;
        } else if (number2 < number3) {
            return number2;
        } else {
            return number3;
        }
    }

    let num1 = +prompt("Nhập số thứ 1");
    let num2 = +prompt("Nhập số thứ 2");
    let num3 = +prompt("Nhập số thứ 3");
    let result = compareNumber(num1, num2, num3);
    alert("Số nhỏ nhất là " + result);
</script>
</body>
</html>
