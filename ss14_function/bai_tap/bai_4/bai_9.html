<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function checkArray(arr, numb) {
        let count = 0;
        for (let i = 0; i < arr.length; i++) {
            if (numb === arr[i]) {
                count++;
            }
        }
        if (count === 0) {
            return -1;
        }
        return count;
    }

    let numbers = [1, 2, 3, 4, 5, 3];
    let result = checkArray(numbers, 3);
    alert(result);
</script>
</body>
</html>
