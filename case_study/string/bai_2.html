<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function differentSymbolsNaive(s) {
        let unique = [];
        for (let i = 0; i < s.length; i++) {
            let exists = false;
            for (let j = 0; j < unique.length; j++) {
                if (s[i] === unique[j]) {
                    exists = true;
                    break;
                }
            }
            if (!exists) {
                unique.push(s[i]);
            }
        }
        return unique.length;
    }

    console.log(differentSymbolsNaive("cabcac"));
</script>
</body>
</html>
