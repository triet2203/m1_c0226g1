<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function commonCharacterCount(s1, s2) {
        let count = 0;
        let arr2 = s2.split("");
        for (let i = 0; i < s1.length; i++) {
            for (let j = 0; j < arr2.length; j++) {
                if (s1[i] === arr2[j]) {
                    count++;
                    arr2.splice(j, 1);
                    break;
                }
            }
        }
        return count;
    }
    document.writeln(commonCharacterCount("aabccd", "adcaadd"));
</script>
</body>
</html>
