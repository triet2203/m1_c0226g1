<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let h = +prompt("Nhập chiều cao")
    for (let i = 1; i <= h; i++) {
        for (let j = 1; j <= h - i; j++) {
            document.writeln("&ensp;");
        }
        for (let j = 1; j <= 2 * i - 1; j++) {
            if (i == 1 || i == h || j == 1 || j == 2 * i - 1) {
                document.writeln("*");
            } else {
                document.writeln("&ensp;");
            }
        }
        document.writeln("<br>");
    }
</script>
</body>
</html>
