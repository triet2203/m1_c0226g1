<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let total = 0;
    let quantity = 0;
    let isContinue = true;
    while(isContinue) {
        let menu = prompt("----------Menu----------\n" +
            "1. Cafe\n" +
            "2. Cam vắt\n" +
            "3. Nước ép cà rốt\n" +
            "4. Nước ép cà chua\n" +
            "5. Nước lọc\n" +
            "6. Nước dừa\n" +
            "7. Thoát gọi món");
        switch (menu){
            case "1":
                quantity = +prompt("1 ly 10k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 10;
                break;
            case "2":
                quantity = +prompt("1 ly 15k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 15;
                break;
            case "3":
                quantity = +prompt("1 ly 20k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 20;
                break;
            case "4":
                quantity = +prompt("1 ly 25k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 25;
                break;
            case "5":
                quantity = +prompt("1 ly 30k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 30;
                break;
            case "6":
                quantity = +prompt("1 ly 35k nha, bạn muốn order bao nhiêu ly nè?");
                total += quantity * 35;
                break;
            case "7":
                alert("Tổng số tiền bạn cần trả là: " + total + "k");
                isContinue = false;
                break;
            default:
                alert("Không có trong menu, chọn lại nha");
        }
    }
</script>
</body>
</html>
