<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<script>
    function sumEvenNumber(matrix, m, n) {
        let sum = 0;
        for (let i = 0; i < m; i++) {
            for (let j = 0; j < n; j++) {
                if (matrix[i][j] % 2 === 0) {
                    sum += matrix[i][j];
                }
            }
        }
        return sum;
    }

    let m = +prompt("Nhập số hàng");
    let n = +prompt("Nhập số cột");
    let matrix = [];
    for (let i = 0; i < m; i++) {
        matrix[i] = [];
        for (let j = 0; j < n; j++) {
            matrix[i][j] = +prompt(`Nhập phần tử [${i}][${j}]`);
        }
    }
    let result = sumEvenNumber(matrix, m, n)
    console.log(matrix);
    console.log(result);
</script>
</body>
</html>
