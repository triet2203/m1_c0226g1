<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
     function isPrime(n) {
          if (n < 2) {
              return false
          }
         for (let i = 2; i <= Math.sqrt(n); i++) {
             if (n % i === 0) {
                 return false;
             }
         }
         return true;
     }

     function countPrime(matrix, m, n) {
         let count = 0;
         for (let i = 0; i < n; i++) {
             for (let j = 0; j < m; j++) {
                 if (isPrime(matrix[i][j])) {
                     count++;
                 }
             }
         }
         return count;
     }

     let matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]];
     console.log(countPrime(matrix, 3, 3));
</script>
</body>
</html>
