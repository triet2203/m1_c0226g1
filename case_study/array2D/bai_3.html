<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function findMinMax(matrix, m, n) {
        let max = matrix[0][0];
        let min = matrix[0][0];
        for (let i = 0; i < m; i++) {
            for (let j = 0; j < n; j++) {
                if (matrix[i][j] > max) {
                    max = matrix[i][j];
                }
                if (matrix[i][j] < min) {
                    min = matrix[i][j];
                }
            }
        }
        return {
            max: max,
            min: min
        }
    }

    let matrix = [[1, -5, 9], [6, 15, 12]];
    console.log(findMinMax(matrix, 2, 3));
</script>
</body>
</html>
