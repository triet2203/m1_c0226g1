<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let character = prompt("Nhập 1 ký tự trong bảng chữ cái tiếng Anh");
    if (character >= "a" && character <= "z" || character >= "A" && character <= "Z") {
        if (character.length == 1) {
            switch (character) {
                case "o":
                case "u":
                case "i":
                case "a":
                case "e":
                case "O":
                case "U":
                case "I":
                case "A":
                case "E":
                    document.writeln(character + " là ký tự nguyên âm");
                    break;
                default:
                    document.writeln(character + " là ký tự phụ âm");
            }
        } else {
            alert("Nhập 1 ký tự thôi");
        }
    } else {
        alert("Nhập lại nha");
    }

</script>
</body>
</html>
